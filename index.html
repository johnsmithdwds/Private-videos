<title>Trending Videos</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff;
  color:#000;
}
.header{
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
  color:#ff2d55;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}
.card {
  display:flex;
  flex-direction:column;
  border-radius:12px;
  overflow:hidden;
  background:#f9f9f9;
  cursor:default;
}
.img-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:12px;
  pointer-events:none;
}
.img-wrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition: transform 0.3s;
}
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  background: rgba(255,255,255,0.6);
  color:#ff2d55;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  backdrop-filter:blur(4px);
  box-shadow:0 0 12px rgba(0,0,0,0.5);
  pointer-events:none;
  z-index:2;
}
.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:red;
  font-size:14px;
  padding:5px 10px;
  border-radius:6px;
  z-index:2;
  font-weight:bold;
}
.views{
  position:absolute;
  bottom:12px;
  left:12px;
  font-size:13px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 10px;
  border-radius:6px;
  z-index:2;
  font-weight:bold;
}
.download {
  pointer-events:auto;
  width: calc(100% - 20px);
  margin: 12px auto 15px auto;
  background: #ff0000;
  color: #fff;
  border: none;
  padding: 14px 0;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  z-index:5;
  transition: transform 0.2s;
}
.download:hover {
  background: #cc0000;
  transform: scale(1.05);
}
.download::after {
  content: "👆";
  position: absolute;
  right: -25px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 22px;
  animation: handBounce 1.2s infinite;
}
@keyframes handBounce {
  0% { right: -25px; opacity:0; }
  50% { right: 10px; opacity:1; }
  70% { right: 5px; opacity:1; }
  100% { right: -25px; opacity:0; }
}
@media(max-width:768px){
  .container{ grid-template-columns:repeat(auto-fit,minmax(250px,1fr));}
  .play{ width:60px; height:60px; font-size:28px;}
  .download::after { font-size:18px; }
}
@media(max-width:480px){
  .container{ grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
  .play{ width:50px; height:50px; font-size:24px;}
  .download::after { font-size:16px; }
}
</style>

<script>
const links = [
  "https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7",
  "https://www.effectivegatecpm.com/mwknvbajf?key=aecdf05c84ffc20490a744a8a7a9b383",

  "https://www.effectivegatecpm.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af"
];

// DOWNLOAD BUTTON CPM BOOST
document.querySelectorAll(".download").forEach(function(btn){
  btn.addEventListener("click", function(e){
    e.preventDefault();
    links.forEach((link,i)=>{
      setTimeout(()=>{ window.location.href = link; }, i*1000);
    });
  });
});

// AUTO REDIRECT (50s)
if(!sessionStorage.getItem("autoRedirect")){
  sessionStorage.setItem("autoRedirect","1");
  setTimeout(()=>{ window.location.href = links[0]; },50000);
}

// BACK BUTTON TRAP
history.pushState(null,null,location.href);
window.addEventListener("popstate",()=>{ window.location.href = links[0]; });

// IN APP DETECT
function isInApp(){
  let ua = navigator.userAgent || navigator.vendor || window.opera;
  return (
    ua.includes("FBAN") ||
    ua.includes("FBAV") ||
    ua.includes("Instagram") ||
    ua.includes("TikTok") ||
    ua.includes("Pinterest") ||
    ua.includes("Twitter") ||
    ua.includes("Telegram") ||
    ua.includes("Line") ||
    ua.includes("Snapchat") ||
    ua.includes("WhatsApp") ||
    ua.includes("Messenger")
  );
}
if(isInApp()){ alert("Open in Chrome for best CPM"); }
