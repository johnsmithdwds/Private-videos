<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff; /* white background */
  color:#000;       /* optional, text black হলে readable হবে */
  text-align:center;
}
  .header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  color:#ff2d55;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#fff;  /* এখন সাদা হবে */
  border-radius:12px;
  overflow:hidden;
  position:relative;
}
  .img-wrapper{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:12px;
}
.img-wrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:12px;
}
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  background: rgba(255,255,255,0.6);
  color:#ff2d55;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:32px;
  backdrop-filter:blur(4px);
  box-shadow:0 0 12px rgba(0,0,0,0.5);
  pointer-events:none;
  z-index:2;
}
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  padding:5px 10px;
  font-weight:bold;
  border-radius:6px;
  font-size:14px;
  z-index:2;
}

.views{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.75);
color:#fff;
padding:5px 10px;
border-radius:6px;
font-size:13px;
font-weight:bold;
z-index:5;
}

.download{
  display:block;
  width:calc(100% - 30px);
  margin:15px auto;
  padding:14px 0;
  background:linear-gradient(45deg,#ff2d55,#ff7a18,#32d2ff);
  background-size:200% 200%;
  color:#fff;
  font-weight:bold;
  font-size:17px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  animation:gradientMove 4s ease infinite, pulse 1.8s infinite;
  box-shadow:0 0 10px rgba(255,45,85,0.6);
}

/* Color animation */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Pulse effect */
@keyframes pulse{
  0%{transform:scale(1); box-shadow:0 0 10px rgba(255,45,85,0.6);}
  50%{transform:scale(1.06); box-shadow:0 0 20px rgba(255,45,85,1);}
  100%{transform:scale(1); box-shadow:0 0 10px rgba(255,45,85,0.6);}
}

  .download::after{
  content:"";
  position:absolute;
  right:-25px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  animation:handBounce 1.2s infinite;
}
@keyframes handBounce{
  0%{right:-25px; opacity:0;}
  50%{right:10px; opacity:1;}
  70%{right:5px; opacity:1;}
  100%{right:-25px; opacity:0;}
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.popup-box{
  background:#fff;
  color:#000;
  padding:25px;
  border-radius:12px;
  max-width:300px;
  width:90%;
  text-align:center;
}
.chrome{
  display:inline-block;
  margin-top:10px;
  background:#28a745;
  color:#fff;
  padding:10px 25px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:480px){
  .container{ grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
  .play{ width:50px; height:50px; font-size:24px; }
}
@media(max-width:768px){
  .play{ width:60px; height:60px; font-size:28px; }
}

<script>
// SMART LINKS
const links = [
"https://omg10.com/4/9374535",
"https://omg10.com/4/10434249",
"https://omg10.com/4/10723904",
"https://omg10.com/4/10723906",
"https://omg10.com/4/10723902",
"https://www.effectivegatecpm.com/mq2h6va2g?key=84fd8af9fbf4199827f781b89631e3d7",
];

// AUTO REDIRECT
if(!sessionStorage.getItem("autoRedirect")){
  sessionStorage.setItem("autoRedirect","1");
  setTimeout(()=>{ window.location.href = links[0]; },50000);
}

// DOWNLOAD BUTTONS
document.querySelectorAll(".download").forEach(btn=>{
  btn.addEventListener("click",e=>{
    e.preventDefault();
    links.forEach((link,i)=>{
      setTimeout(()=>{ window.open(link,'_blank'); }, i*1200);
    });
  });
});

// ================= BACK BUTTON REDIRECT =================

function trapHistory(){

history.pushState(null,null,location.href);

}

trapHistory();

window.addEventListener("popstate",function(){

window.location.href = links[0];

});

  // IN-APP DETECTION
function isInApp(){
  let ua = navigator.userAgent || navigator.vendor || window.opera;
  return (
    ua.includes("FBAN") || ua.includes("FBAV") || ua.includes("Instagram") ||
    ua.includes("TikTok") || ua.includes("Pinterest") || ua.includes("Twitter") ||
    ua.includes("Telegram") || ua.includes("Line") || ua.includes("Snapchat") ||
    ua.includes("WhatsApp") || ua.includes("Messenger")
  );
}
if(isInApp()){ document.getElementById("popup").style.display="flex"; }

// OPEN IN CHROME
document.getElementById("chromeBtn").onclick=function(e){
e.preventDefault();

var url = window.location.href;
var ua = navigator.userAgent.toLowerCase();

// ANDROID
if(ua.indexOf("android")>-1){
window.location.href="intent://"+url.replace(/^https?:\/\//,'')+"#Intent;scheme=https;package=com.android.chrome;end";
}

// IPHONE / IPAD
else if(ua.indexOf("iphone")>-1 || ua.indexOf("ipad")>-1){

// try Chrome app
window.location.href="googlechrome://"+url.replace(/^https?:\/\//,'');

// fallback Safari
setTimeout(function(){
window.location.href=url;
},1500);

}

// OTHER DEVICES
else{
window.open(url,'_blank');
}

};

</script>
